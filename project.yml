# XcodeGen-спецификация проекта Quant Voice.
# На маке: brew install xcodegen && xcodegen generate && open QuantVoice.xcodeproj
# Или одной командой: ./scripts/build.sh
#
# .xcodeproj в репозитории не лежит — он генерируется из этого файла.

name: QuantVoice

options:
  bundleIdPrefix: com.quant
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

# Единственная внешняя зависимость (ТЗ 5.2): WhisperKit из монорепозитория Argmax.
# Пин на точную версию — никаких транзитивных сюрпризов при пересборке.
# v1.0.0 — актуальный релиз на 19.07.2026 (проверено по GitHub Releases).
packages:
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift
    exactVersion: 1.0.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # Строгая конкурентность — в Swift 6 включена языковым режимом,
    # ключ оставлен явно, чтобы намерение читалось из спецификации.
    SWIFT_STRICT_CONCURRENCY: complete
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: "YES"
    Release:
      # Universal-бинарь (ТЗ 5.1): arm64 + x86_64.
      ONLY_ACTIVE_ARCH: "NO"

targets:
  QuantVoice:
    type: application
    platform: macOS
    sources:
      - path: QuantVoice
        excludes:
          - "Resources/Info.plist"
    dependencies:
      - package: ArgmaxOSS
        product: WhisperKit
    settings:
      base:
        PRODUCT_NAME: QuantVoice
        PRODUCT_BUNDLE_IDENTIFIER: com.quant.voice
        INFOPLIST_FILE: QuantVoice/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        # Ad-hoc подпись (ТЗ 10): без Apple Developer, подпись "-".
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        # Hardened Runtime не нужен без нотаризации; sandbox выключен —
        # он несовместим с CGEventTap и Accessibility API (ТЗ 5.1).
        ENABLE_HARDENED_RUNTIME: "NO"
        ENABLE_APP_SANDBOX: "NO"
        COMBINE_HIDPI_IMAGES: "YES"

# Явная общая схема, чтобы xcodebuild -scheme работал из скрипта
# без открытия проекта в Xcode.
schemes:
  QuantVoice:
    build:
      targets:
        QuantVoice: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
